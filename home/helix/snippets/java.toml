[[snippets]]
prefix = "scanner"
body = '''
import java.util.Scanner;

public class ${1:Main} {
    public static void main(String[] args) {
        try (Scanner ${2:scanner} = new Scanner(System.in)) {
            ${0}
        }
    }
}
'''
description = "Java Scanner with try-with-resources"

